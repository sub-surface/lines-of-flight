<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#FAFAF8;cursor:none;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  canvas{display:block;position:fixed;inset:0;}

  /* the one piece of chrome: a whisper in the top-right. A small mark by default;
     the controls reveal on hover. mix-blend:difference keeps it legible on both
     the light and the dark world without us tracking the theme in CSS. */
  #ui{position:fixed; top:0; right:0; padding:14px 16px; z-index:10;
      font:400 13px/1.5 Georgia,"EB Garamond","Times New Roman",serif;
      color:#888; mix-blend-mode:difference; cursor:default;
      text-align:right;}
  #ui .mark{display:inline-block; width:7px; height:7px; border-radius:50%;
      background:#888; opacity:.5; transition:opacity .4s ease; vertical-align:middle;}
  #ui:hover .mark{opacity:0;}
  #ui .panel{max-height:0; overflow:hidden; opacity:0; pointer-events:none;
      transition:max-height .5s ease,opacity .5s ease; margin-top:2px;}
  #ui:hover .panel{max-height:160px; opacity:1; pointer-events:auto;}
  #ui .panel a, #ui .panel button{display:block; color:#888; background:none;
      border:0; padding:3px 0; margin:0 0 0 auto; font:inherit; text-decoration:none;
      cursor:pointer; opacity:.75; transition:opacity .25s ease; text-align:right;}
  #ui .panel a:hover, #ui .panel button:hover{opacity:1;}

  /* the boot veil: a quiet landing that lets the field warm up behind it.
     Not a loading screen — the sim is already alive underneath; this just gives
     it a few seconds to breathe, then dissolves. Same paper as the world. */
  #boot{position:fixed; inset:0; z-index:20; background:#FAFAF8;
        display:flex; align-items:center; justify-content:center; cursor:default;
        transition:opacity 1.6s ease; opacity:1;}
  #boot.lift{opacity:0; pointer-events:none;}
  #boot .lines{font:400 clamp(15px,2.2vw,21px)/2.1 Georgia,"EB Garamond","Times New Roman",serif;
        color:#3A3A38; text-align:center; max-width:32ch; padding:0 8vw;}
  #boot .lines span{display:block; opacity:0; transition:opacity 1.1s ease;}
  #boot .lines span.in{opacity:1;}
  #boot .enter{position:absolute; bottom:11vh; left:0; right:0; text-align:center;
        font:400 13px/1.5 Georgia,"EB Garamond",serif; color:#9a9a96;
        opacity:0; transition:opacity 1.1s ease;}
  #boot .enter.in{opacity:.8;}
  @media (prefers-reduced-motion: reduce){
    #boot, #boot .lines span, #boot .enter{transition:none;}
  }

<body>
<canvas id="c"></canvas>
<div id="boot" aria-label="entering">
  <p class="lines">
    <span>A black dot on a white that does not end.</span>
    <span>Move, and a line leaves you behind.</span>
    <span>It will not stay. Watch it become weather.</span>
  </p>
  <div class="enter">— move, or touch, to begin —</div>
</div>
<nav id="ui" aria-label="controls">
  <span class="mark" aria-hidden="true"></span>
  <div class="panel">
    <button id="uiTheme" type="button" title="Shortcut: Space">invert</button>
    <a href="https://subsurfaces.net" target="_blank" rel="noopener">subsurfaces</a>
    <a href="/about" rel="noopener">about</a>
  </div>
</nav>
<script>
"use strict";
/* Lines of Flight — proof of soul.
   Two beings: the Dot (Stillpoint) you carry, and the Line you shed behind it.
   The line is not kept — it is ink-matter, advected by an invisible field,
   that diffuses into weather and fades into white. The field reveals itself
   only through how the ink moves. Serif text fades in/out of negative space. */

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(typeof allocField==='function') allocField();   // field grid tracks the window
}
window.addEventListener('resize', resize);

/* ---- camera: scroll to zoom, with a particle-budget LOD ----
   Particles, sources and the dot live in WORLD space. The camera maps world
   → screen: screen = (world - cam) * zoom. Default is identity (zoom 1, no
   pan), so with the wheel untouched nothing changes from the original game.

   The trick that keeps zoom cheap: the baked field grid stays sized to the
   SCREEN (constant FCOLS×FROWS no matter the zoom), but each node samples the
   WORLD coordinate under it — so a zoomed-in view bakes the same number of
   cells over a smaller slice of world. And because a smaller slice of world is
   visible, fewer particles are needed for the same on-screen density: shed
   rate scales by 1/zoom and out-of-view ink is culled, so the particle count
   never explodes as you zoom in. */
const cam = { zoom:1, x:0, y:0, tzoom:1 };   // x,y = world coord at screen (0,0)
const ZMIN=0.35, ZMAX=6;
function screenToWorldX(sx){ return cam.x + sx/cam.zoom; }
function screenToWorldY(sy){ return cam.y + sy/cam.zoom; }
// zoom toward a screen anchor (cursor), keeping the world point under it fixed
function zoomAt(sx, sy, factor){
  const wx = screenToWorldX(sx), wy = screenToWorldY(sy);
  cam.tzoom = Math.max(ZMIN, Math.min(ZMAX, cam.tzoom*factor));
  // pan so (wx,wy) stays under (sx,sy) at the NEW (eventual) zoom is eased in
  // stepCam; here we set the target anchor so the ease converges correctly.
  cam._ax=sx; cam._ay=sy; cam._wx=wx; cam._wy=wy;
}
function stepCam(dt){
  const z0=cam.zoom;
  cam.zoom += (cam.tzoom-cam.zoom)*Math.min(1,dt*0.012);
  if(Math.abs(cam.zoom-cam.tzoom)<0.0005) cam.zoom=cam.tzoom;
  if(cam._wx!==undefined){
    // keep the anchored world point pinned under the anchor screen pixel
    cam.x = cam._wx - cam._ax/cam.zoom;
    cam.y = cam._wy - cam._ay/cam.zoom;
    if(cam.zoom===cam.tzoom){ cam._wx=cam._wy=undefined; }
  }
  return cam.zoom!==z0;
}

/* ---- theme: light paper ⇄ dark, eased so the world *breathes* between them ----
   `mix` runs 0 (light) → 1 (dark); pressing Space eases it across. Background
   and ink colours are interpolated from it, so a single value inverts the world. */
const theme = {
  mix:0, target:0,
  bgA:[250,250,248], bgB:[15,16,18],     // paper-white ⇄ near-black
  inkA:[17,17,17],   inkB:[238,238,236], // ink-black ⇄ ink-white
};
function lerp(a,b,t){ return a+(b-a)*t; }
function rgb(A,B,t){ return 'rgb('+(lerp(A[0],B[0],t)|0)+','+(lerp(A[1],B[1],t)|0)+','+(lerp(A[2],B[2],t)|0)+')'; }
function bgColor(){ return rgb(theme.bgA,theme.bgB,theme.mix); }
function inkColor(){ return rgb(theme.inkA,theme.inkB,theme.mix); }
function toggleTheme(){ theme.target = theme.target>0.5?0:1; }
function stepTheme(dt){ theme.mix += (theme.target-theme.mix)*Math.min(1,dt*0.006); }

/* ---- the Dot: Stillpoint, now carried — it locks to the cursor ----
   The dot is the point you are; the line is what you shed behind it.
   It eases toward the cursor so even your own position has a little weight. */
const dot = {x:0,y:0,px:0,py:0,vx:0,vy:0};   // world space
function placeDot(){ dot.x=dot.px=W*0.5; dot.y=dot.py=H*0.5; }
// mouse.sx/sy = screen pixels (for zoom anchor); x/y = world coord under cursor
const mouse = {sx:0,sy:0,x:0,y:0,inside:false};

/* ---- The field: invisible forces between bodies ----
   One velocity field sampled anywhere in the plane. It is the sum of:
     • a slow curl-noise base (the breathing of smooth space)
     • field-sources, each a body that warps the space around it.
   A source's `A` and `B` parameters unify all radial/vortical forces (attract,
   repel, swirl, spiral) into a single algebraic potential flow field.
   The set of live sources is a STORY STATE we change at beats (see beats[]). */
const sources = [];   // {x,y,A,B,r2,shiver}
let globalFlow = {x:0, y:0};
let fieldT = 0;       // field's own slow clock (advances each step)

// cheap value-noise via summed sines — smooth, seamless, no tables
function noise2(x,y,t){
  return Math.sin(x*0.0042 + t*0.6) * Math.cos(y*0.0051 - t*0.4)
       + 0.5*Math.sin((x+y)*0.0033 - t*0.9)
       + 0.5*Math.cos((x-y)*0.0037 + t*0.7);
}
// velocity at a point, written into the shared out-vector [ofx,ofy] to avoid
// allocating per call. Used to BAKE the coarse field grid (a few hundred calls
// per frame) — never per particle. Per-particle sampling is sampleField() below.
let ofx=0, ofy=0;
function evalField(x,y){
  const t=fieldT, e=2.0;
  // curl of scalar noise: (∂n/∂y, -∂n/∂x) → divergence-free, looks like flow
  const nx1=noise2(x,y+e,t), nx2=noise2(x,y-e,t);
  const ny1=noise2(x+e,y,t), ny2=noise2(x-e,y,t);
  let vx=(nx1-nx2)*22 + globalFlow.x, vy=-(ny1-ny2)*22 + globalFlow.y;
  
  // Add active gusts from events
  for(let i=0; i<events.length; i++){
    if(events[i].gust && events[i].vxFlow){
      vx += events[i].vxFlow;
      vy += events[i].vyFlow;
    }
  }
  
  for(let i=0;i<sources.length;i++){
    const s=sources[i];
    if(s.gust) continue; // handled above as global flow
    const dx=x-s.x, dy=y-s.y;
    const d2=dx*dx+dy*dy;
    const denom=1/(d2+s.r2); // single reciprocal, zero square roots!
    
    if(s.shiver){
      vx += (noise2(x*9,y*9,t*7))*30*denom*s.r2;
      vy += (noise2(y*9,x*9,t*7))*30*denom*s.r2;
    } else {
      // s.A = radial strength (sink/source), s.B = rotational strength (vortex)
      const A = s.currA !== undefined ? s.currA : s.A;
      const B = s.currB !== undefined ? s.currB : s.B;
      vx += (A * dx + B * dy) * denom;
      vy += (A * dy - B * dx) * denom;
    }
  }
  ofx=vx; ofy=vy;
}

/* ---- baked field grid ----
   The expensive curl-noise + source math is evaluated ONCE per frame onto a
   coarse grid (~36px cells). Particles then read the field by bilinear
   interpolation between the four surrounding grid nodes — O(1), no trig, no
   allocation. This is not just faster: interpolating a baked field gives
   smoother, more coherent flow than sampling noise independently per particle. */
const FCELL=36;
const INV_FCELL = 1 / FCELL;
let FCOLS=0, FROWS=0, fvx=null, fvy=null;
function allocField(){
  FCOLS=Math.ceil(W*INV_FCELL)+2; FROWS=Math.ceil(H*INV_FCELL)+2;
  fvx=new Float32Array(FCOLS*FROWS); fvy=new Float32Array(FCOLS*FROWS);
}
// Grid node (i,j) covers the WORLD coord under screen pixel ((i-0.5)*FCELL,…).
// At zoom z, one screen cell = FCELL px = FCELL/z world units, so the whole
// grid spans the visible world rect. Cost is independent of zoom.
function bakeField(){
  const wcell = FCELL/cam.zoom;          // world units per grid cell
  for(let j=0;j<FROWS;j++){
    const y=cam.y + (j-0.5)*wcell;
    for(let i=0;i<FCOLS;i++){
      evalField(cam.x + (i-0.5)*wcell, y);
      const o=j*FCOLS+i; fvx[o]=ofx; fvy[o]=ofy;
    }
  }
}
// bilinear sample at a WORLD point → writes ofx/ofy (shared out-vector).
function sampleField(x,y){
  const zInvCell = cam.zoom*INV_FCELL;
  let gx=(x-cam.x)*zInvCell+0.5, gy=(y-cam.y)*zInvCell+0.5;
  if(gx<0)gx=0; else if(gx>FCOLS-1.001)gx=FCOLS-1.001;
  if(gy<0)gy=0; else if(gy>FROWS-1.001)gy=FROWS-1.001;
  const i=gx|0, j=gy|0, fx=gx-i, fy=gy-j;
  const o=j*FCOLS+i, o2=o+FCOLS;
  const txa=fvx[o]+(fvx[o+1]-fvx[o])*fx;
  const txb=fvx[o2]+(fvx[o2+1]-fvx[o2])*fx;
  ofx=txa+(txb-txa)*fy;
  const tya=fvy[o]+(fvy[o+1]-fvy[o])*fx;
  const tyb=fvy[o2]+(fvy[o2+1]-fvy[o2])*fx;
  ofy=tya+(tyb-tya)*fy;
}

/* ---- The ink: particles you shed, that live, diffuse, and fade ----
   Each particle remembers its previous position so we can draw it as a short
   streak along its own motion — the line becomes-physical as a smear of flow.
   Age drives three becomings: diffusion grows (it spreads into weather),
   mass/opacity decay (it fades into white), streaks lengthen then thin. */
/* Structure-of-Arrays particle pool — the performance heart.
   Every particle field is a column in a pre-allocated Float32Array. There is
   NO per-particle object and NO allocation after startup: shedding writes into
   slot `count`, death compacts in place. This removes the steady-state GC churn
   (12k objects born and freed every second) that was the main source of the
   periodic lag spikes, and keeps the hot loop cache-friendly. The math is
   identical to the old object version — same character, same detail. */
const MAXINK = 12000;
let count = 0;                    // live particle count
const px_=new Float32Array(MAXINK), py_=new Float32Array(MAXINK);   // prev pos
const x_ =new Float32Array(MAXINK), y_ =new Float32Array(MAXINK);   // pos
const vx_=new Float32Array(MAXINK), vy_=new Float32Array(MAXINK);   // vel
const age_=new Float32Array(MAXINK), invLife_=new Float32Array(MAXINK);
const invMass_=new Float32Array(MAXINK), grip_=new Float32Array(MAXINK);
const seed_=new Float32Array(MAXINK), f_=new Float32Array(MAXINK);
const txt_=new Float32Array(MAXINK);            // text-hold value (0 = pure ink)
const txtInit_=new Uint8Array(MAXINK);          // is this a text particle?
const hx_=new Float32Array(MAXINK), hy_=new Float32Array(MAXINK);   // glyph home
const mass_=new Float32Array(MAXINK);
// cached last field sample per particle, for temporal staggering: old/settled
// ink only re-samples the field every other frame and reuses this between.
const ofx_=new Float32Array(MAXINK), ofy_=new Float32Array(MAXINK);
// expose a tiny shim so the OG/test tooling and any reader can see the count
const ink = { get length(){ return count; } };

const RAND_SIZE = 2048;
const randTable = new Float32Array(RAND_SIZE);
for(let i=0; i<RAND_SIZE; i++) randTable[i] = Math.random() - 0.5;
let randIdx = 0;

// Sin LUT — the render pulse (drawInk) calls Math.sin per particle per frame
// (~720k/sec). A 256-entry table indexed by phase*(256/2π) & 255 removes the
// transcendental entirely. SIN_SCALE maps radians → table index; the &255 wrap
// makes it periodic for free. Quality loss is imperceptible (the pulse is a ±15%
// shimmer). Same trick as randTable, applied to trig.
const SIN_SIZE = 256, SIN_MASK = 255;
const SIN_SCALE = SIN_SIZE/(Math.PI*2);
const sinTable = new Float32Array(SIN_SIZE);
for(let i=0;i<SIN_SIZE;i++) sinTable[i]=Math.sin(i/SIN_SCALE);
// lutSin(radians): wrap to a table index. (x*SCALE) can be negative, so &MASK
// after a |0 — JS bitwise wraps two's-complement, and seeds/phase are ≥0 here
// anyway, so the index is always in range.
function lutSin(x){ return sinTable[(x*SIN_SCALE)&SIN_MASK]; }

function shed(x,y, n, vx, vy){
  for(let i=0;i<n;i++){
    if(count>=MAXINK) break;
    const a=Math.random()*6.283, r=Math.random()*4;
    const life=8000+Math.random()*12000; // 8s–20s tail life
    const mass=0.55+Math.random()*Math.random()*1.9;   // skew small: many fine, few fat
    const sx=x+Math.cos(a)*r, sy=y+Math.sin(a)*r;
    const k=count++;
    x_[k]=px_[k]=sx; y_[k]=py_[k]=sy;
    vx_[k]=(vx||0)*0.3+(Math.random()-0.5)*0.6;
    vy_[k]=(vy||0)*0.3+(Math.random()-0.5)*0.6;
    age_[k]=0; invLife_[k]=1/life; mass_[k]=mass; invMass_[k]=1/mass;
    grip_[k]=0.10/Math.sqrt(mass); seed_[k]=Math.random()*6.283;
    f_[k]=0; txt_[k]=0; txtInit_[k]=0; hx_[k]=0; hy_[k]=0;
    ofx_[k]=0; ofy_[k]=0;   // no cached field until first sample
  }
}
// text-ink: born at its glyph position, held there (legible), released to the
// field late so the line dissolves into weather as it fades.
function spawnTextInk(hx,hy,life){
  if(count>=MAXINK) return;
  const jx=(Math.random()-0.5)*1.2, jy=(Math.random()-0.5)*1.2;
  const k=count++;
  x_[k]=hx+jx; y_[k]=hy+jy; px_[k]=hx; py_[k]=hy; vx_[k]=0; vy_[k]=0;
  age_[k]=0; invLife_[k]=1/life; mass_[k]=1; invMass_[k]=1; grip_[k]=0.10;
  seed_[k]=Math.random()*6.283; f_[k]=0; txt_[k]=1; txtInit_[k]=1; hx_[k]=hx; hy_[k]=hy;
  ofx_[k]=0; ofy_[k]=0;
}
let stepTick=0;   // advances once per stepInk call (NOT per frame — stepInk runs ≤3×/frame)
function stepInk(dt){
  const sub=dt*0.06;
  const n=count;
  const parity=stepTick++&1;
  for(let k=0;k<n;k++){
    const age=age_[k]+dt; age_[k]=age;
    const f=age*invLife_[k];
    // Temporal field-sampling stagger: settled ink (text-free AND past its crisp
    // youth) re-samples the field only on its parity step and reuses the cached
    // vector between. Young/thrown ink and text ink always sample, so the
    // responsive "matter" feel is untouched — the saving comes from the old
    // drifting majority where a one-step-stale weather vector is invisible.
    if(txtInit_[k] || age<1200 || (k&1)===parity){
      sampleField(x_[k],y_[k]);       // writes ofx/ofy
      ofx_[k]=ofx; ofy_[k]=ofy;        // cache for the skipped steps
    } else {
      ofx=ofx_[k]; ofy=ofy_[k];        // reuse last good sample
    }
    const grip=grip_[k];
    if(txtInit_[k]){
      const txt = Math.max(0, Math.min(1, (0.75 - f) / 0.35)); txt_[k]=txt;
      const release = f*f;
      let vx=vx_[k], vy=vy_[k];
      if(txt === 0){ txtInit_[k]=0; vx = ofx*sub*3.5; vy = ofy*sub*3.5; }
      const fieldPull = 1+(release-1)*txt;            // lerp(1, release, txt)
      vx += (ofx*sub - vx)*grip*fieldPull;
      vy += (ofy*sub - vy)*grip*fieldPull;
      if(txt > 0){
        const kk = 0.22*(1-release)*txt;
        vx += (hx_[k]-x_[k])*kk; vy += (hy_[k]-y_[k])*kk;
        const damping = 1+(0.78-1)*txt;
        vx *= damping; vy *= damping;
      }
      const textDiff = (0.05+f*1.1)*release;
      const inkDiff = (0.12+f*1.7)*invMass_[k];
      const diff = inkDiff+(textDiff-inkDiff)*txt;
      const rx = randTable[randIdx]; randIdx=(randIdx+1)&2047;
      const ry = randTable[randIdx]; randIdx=(randIdx+1)&2047;
      px_[k]=x_[k]; py_[k]=y_[k];
      x_[k]+=vx+rx*diff; y_[k]+=vy+ry*diff; vx_[k]=vx; vy_[k]=vy;
    }else{
      let vx=vx_[k], vy=vy_[k];
      vx += (ofx*sub - vx)*grip; vy += (ofy*sub - vy)*grip;
      const diff=(0.12+f*1.7)*invMass_[k];
      const rx = randTable[randIdx]; randIdx=(randIdx+1)&2047;
      const ry = randTable[randIdx]; randIdx=(randIdx+1)&2047;
      px_[k]=x_[k]; py_[k]=y_[k];
      x_[k]+=vx+rx*diff; y_[k]+=vy+ry*diff; vx_[k]=vx; vy_[k]=vy;
    }
    f_[k]=f;
  }
  // compact dead + cull far-off-screen ink, copying columns in place.
  if(n){
    const m = 200/cam.zoom;
    const x0=cam.x-m, x1=cam.x+W/cam.zoom+m, y0=cam.y-m, y1=cam.y+H/cam.zoom+m;
    let w=0;
    for(let k=0;k<n;k++){
      if(age_[k]*invLife_[k]>=1) continue;
      const xx=x_[k], yy=y_[k];
      if(xx<x0||xx>x1||yy<y0||yy>y1) continue;
      if(w!==k){
        px_[w]=px_[k]; py_[w]=py_[k]; x_[w]=xx; y_[w]=yy; vx_[w]=vx_[k]; vy_[w]=vy_[k];
        age_[w]=age_[k]; invLife_[w]=invLife_[k]; invMass_[w]=invMass_[k]; grip_[w]=grip_[k];
        seed_[w]=seed_[k]; f_[w]=f_[k]; txt_[w]=txt_[k]; txtInit_[w]=txtInit_[k];
        hx_[w]=hx_[k]; hy_[w]=hy_[k]; mass_[w]=mass_[k];
        ofx_[w]=ofx_[k]; ofy_[w]=ofy_[k];
      }
      w++;
    }
    count=w;
  }
}

/* ---- story beats: the field-state changes ----
   Press SPACE / → to move the world through states (← to go back).
   This is the spec's "region-dependent physics as a felt beat", in miniature.
   Each beat may also name a `voice` line that surfaces when you enter it. */
// world coord at a screen fraction, under the current camera — so beats centre
// on what you're actually looking at, even when zoomed or panned.
const vw=(fx)=>screenToWorldX(W*fx), vh=(fy)=>screenToWorldY(H*fy);
const C=()=>({x:vw(0.5),y:vh(0.5)});
const beats = [
  {name:'still', voice:"“A line of flight is not made of two points. It passes between points, it comes up through the middle.”",
    build:()=>{ sources.length=0; globalFlow.x=0; globalFlow.y=0; }},
  {name:'well', voice:"“To flee is not to renounce action; there is nothing more active than a flight.”",
    build:()=>{ sources.length=0; globalFlow.x=0; globalFlow.y=0;
                sources.push({x:vw(0.5), y:vh(0.5), A:-8000, B:0, r2:12100}); }},
  {name:'stone', voice:"“Lodge yourself on a stratum, experiment with the opportunities it offers, finding possible lines of flight.”",
    build:()=>{ sources.length=0; globalFlow.x=0; globalFlow.y=0;

const recentLines = [];  // {sx,sy,until}
function buildOccupancy(now){
  grid.fill(0);
  const cw=W/GC, ch=H/GR;
  const z=cam.zoom;
  const mark=(sx,sy,w)=>{          // sx,sy in SCREEN px
    const cx=Math.floor(sx/cw), cy=Math.floor(sy/ch);
    if(cx>=0&&cx<GC&&cy>=0&&cy<GR) grid[cy*GC+cx]+=w;

  if(mouse.inside){

    mark(mouse.sx-cw,mouse.sy,8); mark(mouse.sx+cw,mouse.sy,8);
    mark(mouse.sx,mouse.sy-ch,8); mark(mouse.sx,mouse.sy+ch,8);

  // line won't be dropped on top of one that hasn't faded yet.
  for(let i=recentLines.length-1;i>=0;i--){ const r=recentLines[i];
    const left=r.until-now;

  // corners, are clear of the dead-centre where the dot lives, and sit away
  // from the hand/dot. A small jitter breaks ties so successive lines don't
  // pile into the same place (this is why it used to default to top-left).
  const cw=W/GC, ch=H/GR;
  const midX=(GC-1)/2, midY=(GR-1)/2;
  // dot in SCREEN cell units (it lives in world space; project through camera)
  const dsx=(dot.x-cam.x)*cam.zoom, dsy=(dot.y-cam.y)*cam.zoom;
  const dcx=dsx/cw-0.5, dcy=dsy/ch-0.5;
  let best=0, bv=1e9;
  for(let i=0;i<grid.length;i++){
    const cx=i%GC, cy=(i/GC|0);
    let v=grid[i]*1.0;
    // edge penalty: keep text off the rim, weakest in the comfortable middle band
    v += (Math.abs(cx-midX)/midX)*0.8 + (Math.abs(cy-midY)/midY)*0.8;
    // dead-centre penalty (the dot/cursor usually live here)
    if(Math.abs(cx-midX)<1 && Math.abs(cy-midY)<1) v+=2.5;

    const dd=Math.hypot(cx-dcx,cy-dcy);

// fidelity while cutting the readback+scan area ~4× vs the old 3× / step-3.
const glyphCache = new Map();
function glyphPoints(text, fontPx){
  const key = text+'@'+(fontPx|0);

const bAlpha=new Float32Array(AB*WB);
const bWidth=new Float32Array(AB*WB);
const bCoords=[];  // bCoords[b] = Float32Array(MAXINK*4): x0,y0,x1,y1 per segment
const bCount=new Int32Array(AB*WB);
function buildBatches(){
  for(let w=0;w<WB;w++) for(let a=0;a<AB;a++){
    const b=w*AB+a;
    bAlpha[b]=(a+1)/AB*AMAX; bWidth[b]=0.6+w*1.0;
    bCoords.push(new Float32Array(MAXINK*4));
  }
}
function drawInk(){
  bCount.fill(0); // reset counts — reuse the pre-allocated coord arrays
  const pulseBase=fieldT*12;
  const n=count;
  let hasText=false;
  const INV_AMAX_AB=AB/AMAX;
  const invZ=1/cam.zoom;            // streak coords are world; keep widths screen-stable
  for(let i=0;i<n;i++){
    const ti=txtInit_[i], tx=txt_[i];
    if(ti && tx>0.85){ hasText=true; continue; }
    const f=f_[i];
    let a, w;
    if(ti){
      const aText=AMAX*Math.min(1,(1-f)*2.4)*Math.min(1,f*10+0.12);
      const aInk=(1-f)*0.55;
      a=aInk+(aText-aInk)*tx;
      const wInk=mass_[i]*1.3*(1-f*0.7);
      w=wInk+(1.5-wInk)*tx;
    } else {
      a=(1-f)*0.55;
      w=mass_[i]*1.3*(1-f*0.7);
    }
    a*=0.85+0.15*lutSin(pulseBase+seed_[i]);   // LUT: no per-particle trig
    if(a<0.012) continue;
    let ab=(a*INV_AMAX_AB)|0; if(ab>=AB)ab=AB-1; if(ab<0)ab=0;
    let wb=Math.round(w-0.6); if(wb>=WB)wb=WB-1; if(wb<0)wb=0;
    const b=wb*AB+ab;
    const ci=bCount[b]*4;
    const coords=bCoords[b];
    const X=x_[i],Y=y_[i],PX=px_[i],PY=py_[i];
    const dx=X-PX, dy=Y-PY;
    if(dx*dx+dy*dy<0.25){
      coords[ci]=X-0.4; coords[ci+1]=Y; coords[ci+2]=X+0.4; coords[ci+3]=Y;
    } else {
      coords[ci]=PX; coords[ci+1]=PY; coords[ci+2]=X; coords[ci+3]=Y;
    }
    bCount[b]++;
  }
  ctx.lineCap='round'; ctx.strokeStyle=INK;
  for(let b=0;b<AB*WB;b++){
    const cnt=bCount[b]; if(!cnt) continue;
    const coords=bCoords[b];
    ctx.globalAlpha=bAlpha[b]; ctx.lineWidth=bWidth[b]*invZ;
    ctx.beginPath();
    for(let j=0,ci=0;j<cnt;j++,ci+=4){
      ctx.moveTo(coords[ci],coords[ci+1]);
      ctx.lineTo(coords[ci+2],coords[ci+3]);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  // text-ink pass: crisp filled discs while still legible (txt > 0.85)
  if(hasText){
    ctx.fillStyle=INK;
    const rr=0.75*invZ;
    for(let i=0;i<n;i++){
      if(!txtInit_[i]||txt_[i]<=0.85) continue;
      const f=f_[i];
      const a=AMAX*Math.min(1,(1-f)*2.4)*Math.min(1,f*10+0.12);
      if(a<0.02) continue;
      ctx.globalAlpha=a;
      ctx.beginPath(); ctx.arc(x_[i],y_[i],rr,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

/* ---- loop ---- */
let acc=0, last=0, shedRemainder=0;
function stepDot(dt){
  // the point eases toward the cursor (in world space) — your position has weight
  const tx = mouse.inside?mouse.x:dot.x, ty = mouse.inside?mouse.y:dot.y;
  dot.px=dot.x; dot.py=dot.y;
  dot.x += (tx-dot.x)*0.22;
  dot.y += (ty-dot.y)*0.22;
  dot.vx=dot.x-dot.px; dot.vy=dot.y-dot.py;
  // shed ink in proportion to ON-SCREEN speed — world speed × zoom. This LOD is
  // what stops the particle count exploding when zoomed in: a fast world-space
  // move covers few screen pixels when zoomed out (shed little) and many when
  // zoomed in, but we divide the rate back by zoom so screen density is steady.
  const sp=Math.sqrt(dot.vx*dot.vx+dot.vy*dot.vy)*cam.zoom;
  shedRemainder += (sp*0.5)/cam.zoom;
  const n=Math.floor(shedRemainder); shedRemainder-=n;
  if(n>0) shed(dot.x,dot.y, Math.min(n,12), dot.vx, dot.vy);
}
function frame(now){
  if(!last) last=now;
  let dt=now-last; last=now; if(dt>50) dt=50;
  acc+=dt;
  const STEP=16.67;
  stepTheme(dt);
  stepCam(dt);
  INK = inkColor();
  fieldT += dt*0.00018;
  bakeField();
  while(acc>=STEP){ stepDot(STEP); stepEvents(STEP); stepInk(STEP); acc-=STEP; }
  maybeEvent(dt);
  drainSpawnQueue();   // bleed out queued text particles: ~10 frames, no spike
  advanceVoice(now);   // builds the occupancy grid lazily, only when placing a line
  // background fills the whole screen under the identity (DPR-only) transform…
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle=bgColor(); ctx.fillRect(0,0,W,H);
  // …then the world is drawn under the camera transform (world → screen → device)
  const z=cam.zoom*DPR;
  ctx.setTransform(z,0,0,z, -cam.x*z, -cam.y*z);
  drawInk();
  drawDot();
  if(benchDone) requestAnimationFrame(frame);   // during ?bench, the harness re-arms instead
}
let INK='#111';

/* ---- input: the dot follows the cursor; SPACE / click changes the field-state ---- */
function pos(e){
  const t = e.touches ? e.touches[0] : e;
  mouse.sx=t.clientX; mouse.sy=t.clientY;
  mouse.x=screenToWorldX(mouse.sx); mouse.y=screenToWorldY(mouse.sy);
  mouse.inside=true;
}
// scroll to zoom toward the cursor (trackpad pinch arrives as ctrl+wheel)
cv.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const factor = Math.exp(-e.deltaY*(e.ctrlKey?0.01:0.0016));
  zoomAt(e.clientX, e.clientY, factor);
},{passive:false});
window.addEventListener('mousemove',pos);
cv.addEventListener('mouseleave',()=>{mouse.inside=false;});
cv.addEventListener('mouseenter',()=>{mouse.inside=true;});
cv.addEventListener('touchmove',(e)=>{pos(e);e.preventDefault();},{passive:false});
cv.addEventListener('touchstart',(e)=>{pos(e);e.preventDefault();},{passive:false});
// Space inverts brightness (light ⇄ dark); arrows / click move through beats
function nextBeat(){ setBeat(beat+1); }
window.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){ toggleTheme(); e.preventDefault(); }
  else if(e.code==='ArrowRight'){ nextBeat(); e.preventDefault(); }
  else if(e.code==='ArrowLeft'){ setBeat(beat-1); e.preventDefault(); } });
cv.addEventListener('click',nextBeat);
// the one DOM control: invert button (mirrors the Space key)
document.getElementById('uiTheme').addEventListener('click',(e)=>{ toggleTheme(); e.stopPropagation(); });

/* ---- startup benchmark (profiler-free) ----
   Append ?bench to the URL to measure real first-paint cost WITHOUT a DevTools
   profiler attached — the profiler's own ~130ms StartProfiling welds onto frame 0
   and hides the true number, so a trace can't see this. We time each init phase,
   then the first 120 frame() durations, and log a summary. The frame loop's own
   rAF (`benchDone` short-circuits it) is suppressed during the measured window so
   we drive it ourselves; after 120 frames we hand back to the normal self-arming
   loop. Entirely inert when ?bench is absent. */
const BENCH = typeof location!=='undefined' && location.search.includes('bench');
let benchDone = !BENCH;          // when false, frame() skips its own requestAnimationFrame
const benchFrames = [];
function fmt(n){ return n.toFixed(2); }
function runBench(){
  const t = () => performance.now();
  const phases = {};
  let m=t();
  buildBatches();  phases.buildBatches = t()-m; m=t();
  resize();        phases.resize       = t()-m; m=t();
  prewarmVoices(); phases.prewarmVoices= t()-m; m=t();   // 9× getImageData, up front
  placeDot();      phases.placeDot     = t()-m; m=t();
  setBeat(0);      phases.setBeat      = t()-m;   // now a cache hit thanks to prewarm
  console.log('%c[bench] init phases (ms)', 'font-weight:bold');
  console.table(Object.fromEntries(Object.entries(phases).map(([k,v])=>[k,+fmt(v)])));

  function step(now){
    const a=performance.now();
    frame(now);                       // does NOT re-arm rAF while benchDone===false
    benchFrames.push(performance.now()-a);
    if(benchFrames.length<120){ requestAnimationFrame(step); return; }
    // done: report, then release the normal loop
    const xs=benchFrames.slice().sort((p,q)=>p-q);
    const mean=benchFrames.reduce((s,x)=>s+x,0)/benchFrames.length;
    console.log(`[bench] frame 0: ${fmt(benchFrames[0])}ms · frame 1: ${fmt(benchFrames[1])}ms · frame 2: ${fmt(benchFrames[2])}ms`);
    console.log(`[bench] 120 frames — median ${fmt(xs[60])}ms · p95 ${fmt(xs[114])}ms · max ${fmt(xs[119])}ms · mean ${fmt(mean)}ms · frames>16.7ms: ${benchFrames.filter(x=>x>16.7).length}`);
    benchDone=true; requestAnimationFrame(frame);   // resume the real self-arming loop
  }
  requestAnimationFrame(step);
}

/* ---- go ---- */
if(BENCH) runBench();
else { buildBatches(); resize(); prewarmVoices(); placeDot(); setBeat(0); requestAnimationFrame(frame); }

/* ---- the boot veil ----
   A minimal landing. The sim above already started in `go`, so behind this veil
   the field is baking, the glyph cache is warming, and the first ambient events
   and voice are spawning weather — by the time it lifts, the world is already
   alive rather than blank. The veil reveals three lines, invites you in, then
   dissolves on your first move (or after a gentle max dwell). It is never a gate:
   any input lifts it, and we cap the wait so no one is held. */
(function boot(){
  if(BENCH) return;                       // measurement runs bare
  const veil = document.getElementById('boot');
  if(!veil) return;
  const spans = veil.querySelectorAll('.lines span');
  const enter = veil.querySelector('.enter');
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let lifted=false;
  function lift(){
    if(lifted) return; lifted=true;
    veil.classList.add('lift');
    // remove from the DOM after the fade so it never intercepts a later event
    setTimeout(()=>veil.remove(), 1700);
    cleanup();
  }
  const onInput=()=>lift();
  function cleanup(){
    window.removeEventListener('mousemove',onInput);
    window.removeEventListener('keydown',onInput);
    window.removeEventListener('wheel',onInput);
    veil.removeEventListener('click',onInput);
    veil.removeEventListener('touchstart',onInput);
  }

  if(reduce){                             // no staged fades — show all, lift on input
    spans.forEach(s=>s.classList.add('in')); enter.classList.add('in');
  } else {
    // stagger the lines in, then the invitation — the warm-up window
    spans.forEach((s,i)=> setTimeout(()=>s.classList.add('in'), 400 + i*1200));
    setTimeout(()=>enter.classList.add('in'), 400 + spans.length*1200 + 400);
  }

  // lift on the first real intent…
  window.addEventListener('mousemove',onInput,{once:true});
  window.addEventListener('keydown',onInput,{once:true});
  window.addEventListener('wheel',onInput,{passive:true,once:true});
  veil.addEventListener('click',onInput,{once:true});
  veil.addEventListener('touchstart',onInput,{once:true,passive:true});
  // …or after a gentle max dwell, so an idle visitor still arrives in the world
  setTimeout(lift, reduce ? 2500 : 400 + spans.length*1200 + 2400);
})();
</script>
</body>
